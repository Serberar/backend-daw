services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hexauth_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hexauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mailpit (captura de emails en desarrollo) ────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: hexauth_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ── Aplicación Node.js ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: development
    container_name: hexauth_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      PORT: 3000
      APP_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hexauth?schema=public
      JWT_ACCESS_SECRET: dev_access_secret_cambiame_en_produccion
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      EMAIL_FROM: "noreply@hexauth.dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma db push --accept-data-loss && npm run dev"

volumes:
  postgres_data:
